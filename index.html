<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Softgoway Technologies - Premium IT Solutions & Digital Transformation" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Softgoway Technologies | IT Solutions & Innovation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      /* Prevent FOUC - Flash of Unstyled Content */
      html {
        background-color: #0a0a0f;
      }
      html.light {
        background-color: #fafafa;
      }
      /* Smooth theme transition */
      html.transitioning * {
        transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease !important;
      }
    </style>
    <script>
      // Immediately apply theme to prevent flash
      (function() {
        const theme = localStorage.getItem('theme') || 'system';
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const resolvedTheme = theme === 'system' ? systemTheme : theme;
        document.documentElement.classList.add(resolvedTheme);
        
        // Update theme-color meta tag
        const themeColor = resolvedTheme === 'dark' ? '#0a0a0f' : '#fafafa';
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', themeColor);
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
